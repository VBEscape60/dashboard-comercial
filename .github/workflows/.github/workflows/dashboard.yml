name: Atualizar Dados Dashboard

on:
  repository_dispatch:
    types: [atualizar-dados]

jobs:
  atualizar-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar dados.json
        run: |
          echo '${{ toJson(github.event.client_payload.dados) }}' > dados.json

      - name: Commit arquivo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add dados.json
          git commit -m "Atualizando dados dashboard" || echo "Sem alterações"
          git push
